<!DOCTYPE html>
<html>
    <head>
        <title>BMO Agent</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
        <div id="ui">
            <div class="section" id="chat">
                <h1>BMO v0.5</h1>
                <h2>Chat</h2>
                <ul id="chat-history"></ul>
                <div id="status-message"></div>
            </div>
            <div class="section" id="bmo-section">
                <div id="bmo-container">
                    <div id="bmo" >
                        <div id="bmo-screen">
                            <div id="bmo-eyes">
                                <div class="eye left"></div>
                                <div class="eye right"></div>
                            </div>
                            <div id="mouth-container">
                                <canvas id="bmo-mouth"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="details">
                    <div>
                        <pre id="state-text"></pre>
                        <pre id="transcription-metric"></pre>
                        <pre id="llm-metric"></pre>
                        <pre id="audio-metric"></pre>
                        <div id="trace-panel">
                            <h3>Agent Trace</h3>
                            <ul id="trace-list"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <audio src="" style="display: none;" id="player"></audio>
        <script type="module" src="/static/js/websocket.js"></script>
        <script type="module" src="/static/js/recorder.js"></script>
        <script type="module" src="/static/js/audio-player.js"></script>
        <script type="module" src="/static/js/viseme.js"></script>
        <script type="module" src="/static/js/render.js"></script>
        <script type="module" src="/static/js/ui.js"></script>
        <script type="module" src="/static/js/app.js"></script>
    </body>
</html>
